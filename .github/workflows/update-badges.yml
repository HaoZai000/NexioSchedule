name: Update Stats Badges

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch GitHub Stats
        id: github
        run: |
          # иЋ·еЏ– GitHub Stars
          STARS=$(curl -s https://api.github.com/repos/${{ github.repository }} | jq '.stargazers_count')
          echo "stars=$STARS" >> $GITHUB_OUTPUT

          # иЋ·еЏ– GitHub Downloads (ж‰Ђжњ‰ release зљ„жЂ»дё‹иЅЅй‡Џ)
          DOWNLOADS=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases" | jq '[.[].assets[]?.download_count] | add // 0')
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT

          # иЋ·еЏ–жњЂж–°з‰€жњ¬еЏ·
          LATEST=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Fetch Gitee Stats
        id: gitee
        run: |
          # иЋ·еЏ– Gitee Stars
          STARS=$(curl -s "https://gitee.com/api/v5/repos/com_haooz_account/hyper_schedule" | jq '.stargazers_count')
          echo "stars=$STARS" >> $GITHUB_OUTPUT

          # иЋ·еЏ– Gitee Downloads (ж‰Ђжњ‰ release зљ„жЂ»дё‹иЅЅй‡Џ)
          DOWNLOADS=$(curl -s "https://gitee.com/api/v5/repos/com_haooz_account/hyper_schedule/releases" | jq '[.[].assets[]?.download_count] | add // 0')
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT

      - name: Calculate Totals
        id: total
        run: |
          TOTAL_STARS=$(( ${{ steps.github.outputs.stars }} + ${{ steps.gitee.outputs.stars }} ))
          TOTAL_DOWNLOADS=$(( ${{ steps.github.outputs.downloads }} + ${{ steps.gitee.outputs.downloads }} ))
          echo "stars=$TOTAL_STARS" >> $GITHUB_OUTPUT
          echo "downloads=$TOTAL_DOWNLOADS" >> $GITHUB_OUTPUT
          echo "### Badge Stats" >> $GITHUB_STEP_SUMMARY
          echo "- Total Stars: $TOTAL_STARS" >> $GITHUB_STEP_SUMMARY
          echo "- Total Downloads: $TOTAL_DOWNLOADS" >> $GITHUB_STEP_SUMMARY

      - name: Update Badge JSON
        run: |
          cat > badges.json << EOF
          {
            "schemaVersion": 1,
            "label": "Total Stars",
            "message": "${{ steps.total.outputs.stars }}",
            "color": "yellow"
          }
          EOF

          cat > downloads-badge.json << EOF
          {
            "schemaVersion": 1,
            "label": "Total Downloads",
            "message": "${{ steps.total.outputs.downloads }}",
            "color": "orange"
          }
          EOF

      - name: Commit Badge Files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add badges.json downloads-badge.json
          git diff --staged --quiet || git commit -m "chore: update stats badges [skip ci]"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:master
